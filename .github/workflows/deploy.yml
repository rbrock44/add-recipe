name: Build and Deploy Angular App

on:
  push:
    branches:
      - master

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Configure npm Authentication
      run: echo "//registry.npmjs.org/:_authToken=${{ secrets.GITHUB_TOKEN }}" > ~/.npmrc

    - name: Build Project
      run: npm run deploy

    - name: Write runtime app config
      env:
        DELETE_RECIPE_TOKEN: ${{ secrets.DELETE_RECIPE_TOKEN }}
      run: |
        node -e "const fs=require('fs'); const token=(process.env.DELETE_RECIPE_TOKEN||'').trim(); if(!token){throw new Error('Missing required secret: DELETE_RECIPE_TOKEN');} const config={pendingRecipeUrl:'https://family-recipes.ryan-brock.com/recipes/pending',deleteRecipeToken:token}; fs.writeFileSync('./dist/add-recipe/browser/app-config.js', 'window.__APP_CONFIG__ = ' + JSON.stringify(config, null, 2) + ';\n');"

    - name: Add CNAME
      run: |
        cp CNAME ./dist/add-recipe/browser/CNAME

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist/add-recipe/browser
